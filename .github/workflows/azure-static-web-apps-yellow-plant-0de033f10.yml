name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # 1. システム標準のUTF-8ロケールを使用し、日本語解釈の基盤を作る
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        # 2. Ruby実行オプションでUTF-8を強制し、Jekyllのエンコードエラーを封殺
        env:
          JEKYLL_ENV: production
          RUBYOPT: "-EUTF-8:UTF-8"
        run: |
          bundle install
          bundle exec jekyll build

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # 3. Jekyllが生成した完成品（_site）を正確に指定
          app_location: "_site"
          api_location: ""
          output_location: ""
          # 4. Azure側の余計なビルド（Oryx）をスキップさせ、二重ビルドを阻止
          skip_app_build: true
