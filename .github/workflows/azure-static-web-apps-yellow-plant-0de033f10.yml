name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # locale を env に直書きして環境を固定する
    env:
      LANG: ja_JP.UTF-8
      LC_ALL: ja_JP.UTF-8

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install gems and Build Jekyll
        run: |
          bundle install
          JEKYLL_ENV=production bundle exec jekyll build

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # 指摘通りスラッシュを除去。Jekyllが生成したディレクトリを正確に指定
          app_location: "_site"
          api_location: ""
          output_location: ""
          # Azure側の Oryx ビルドをスキップさせる
          skip_app_build: true
