name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Ruby 3.1 のセットアップ
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      # GitHub Actions 上で Jekyll ビルドを実行
      - name: Build Jekyll
        run: |
          bundle install
          bundle exec jekyll build

      # Azure Static Web Apps へ成果物をアップロード
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_PLANT_0DE033F10 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "_site" # Jekyll のビルド成果物を指定
