name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # 1. 日本語（UTF-8）を正しく扱うための環境定義
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        # 2. Ruby実行時にもUTF-8を強制し、あの「\xE3」の呪いを封殺する
        env:
          JEKYLL_ENV: production
          RUBYOPT: "-EUTF-8:UTF-8"
        run: |
          bundle install
          bundle exec jekyll build

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # 3. エスティニアンと合意した、迷いのない配置指定
          app_location: "/"         # リポジトリルートを起点に
          output_location: "_site"  # Jekyllが生成した成果物を狙い撃つ
          api_location: ""
          # 4. 二重ビルドによる10分のタイムアウトを回避する絶対命令
          skip_app_build: true
