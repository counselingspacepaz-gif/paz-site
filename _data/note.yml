      - title: 変わらないために、新しく整えるということ
        media:thumbnail: https://assets.st-note.com/production/uploads/images/269093875/rectangle_large_type_2_c5ecc71d2927ab6785762b189ebffaab.png?width=800
        description: <p name="ac78813a-aa4e-4055-8530-5e68026997f1" id="ac78813a-aa4e-4055-8530-5e68026997f1">「paz（パス）」という場所を整え直しながら、<br>私は改めて考えていました。<br><br>ここから何かを届けようとしているのだろう、と。<br>理由はとてもシンプルで、<br>けれど少しだけ切実なものです。</p><hr name="951599e8-466b-44cb-8287-b43d0928264d" id="951599e8-466b-44cb-8287-b43d0928264d"><br/><a href='https://note.com/noted_pipit7032/n/n34e551a8cf82'>続きをみる</a>
