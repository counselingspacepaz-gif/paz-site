      - title: 【お知らせ】料金改定と予約システムについて
        media:thumbnail: https://assets.st-note.com/production/uploads/images/269911796/rectangle_large_type_2_78110004ef1a61b628270fe3d6252fb1.jpeg?width=800
        description: <p name="f76363f6-0789-4825-b7d3-caf0b043adad" id="f76363f6-0789-4825-b7d3-caf0b043adad">このたび、<strong>2026年5月より料金の改定</strong>を実施し、あわせて <strong>予約システム（Microsoft Bookings）およびホームページのリニューアル</strong>を行っております。</p><p name="8c99173f-9341-403d-978e-e7d02316e95b" id="8c99173f-9341-403d-978e-e7d02316e95b"><br></p><br/><a href='https://note.com/noted_pipit7032/n/n731564661102'>続きをみる</a>
