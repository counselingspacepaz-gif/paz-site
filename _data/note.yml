    item:
      - title: 過去の傷つきを、今の力に変える-EMDRについて
        media:thumbnail: https://assets.st-note.com/production/uploads/images/270779556/rectangle_large_type_2_03a866149d14cf09ed3843f12adb000d.png?width=800
        description: <h3 name="ed36ac82-e00c-4626-953e-539049241dbb" id="ed36ac82-e00c-4626-953e-539049241dbb">——EMDRと、私が大切にしていること</h3><p name="e6d2372f-294f-449c-add9-390794ea61d0" id="e6d2372f-294f-449c-add9-390794ea61d0">「今の苦しさは、過去のせいなのだろうか」<br>「なぜ、あんなに前のことなのに、今もこんなに辛いんだろう」</p><br/><a href='https://note.com/noted_pipit7032/n/nf01a5fc718c5'>続きをみる</a>
        note:creatorImage: https://assets.st-note.com/production/uploads/images/268885294/profile_d98c0326d491a41d1a5f129ac7688cff.png?fit=bounds&format=jpeg&quality=85&width=330
        note:creatorName: Counseling Space paz
        pubDate: Mon, 27 Apr 2026 09:42:47 +0900
        link: https://note.com/noted_pipit7032/n/nf01a5fc718c5
        guid: https://note.com/noted_pipit7032/n/nf01a5fc718c5
      - title: この場所で大切にしていること
        media:thumbnail: https://assets.st-note.com/production/uploads/images/270003356/rectangle_large_type_2_a6165793c15ea36160dfc0ea740521f8.jpeg?width=800
        description: <p name="f17a6e7e-5e20-4d63-b1ca-29b0380bfbf1" id="f17a6e7e-5e20-4d63-b1ca-29b0380bfbf1"><strong>違和感から始める</strong></p><p name="453fa71c-41a6-4d65-bbdc-7e7f39d5d9c3" id="453fa71c-41a6-4d65-bbdc-7e7f39d5d9c3">世の中には、型に嵌まった「正しさ」や、効率的な「解決」が溢れています。 私がカウンセリングスペース paz を作ったのは、そうした世間の「当たり前」と、目の前の誰かが抱える「言いようのない苦しさ」との間にある、埋まらない溝に違和感を覚えたからです。</p><br/><a href='https://note.com/noted_pipit7032/n/nabc385e1ed3c'>続きをみる</a>
        note:creatorImage: https://assets.st-note.com/production/uploads/images/268885294/profile_d98c0326d491a41d1a5f129ac7688cff.png?fit=bounds&format=jpeg&quality=85&width=330
