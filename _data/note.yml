    description: |-
      はじめまして。カウンセリングスペース paz です。
      paz（パス）は、静岡県沼津市を拠点に、
      女性と子どもを中心とした心理支援を行っているカウンセリングスペースです。
      日々の臨床で考えていることや、こころの背景にある視点を、立ち止まりやすい言葉で綴っています。
