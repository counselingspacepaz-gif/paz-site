# --- サイト基本設定 ---
title: "Counseling Space paz"
email: "info@counselingspacepaz.com"
description: |
  静岡県沼津市の女性と子どものためのカウンセリングスペースpaz。臨床心理士・公認心理師による、心の問題、育児、発達、家族関係の専門的な相談に対応しています。

# Azure SWA 独自ドメイン運用のため空文字に修正
baseurl: ""

# 本番ドメインを正しく反映
url: "https://counselingspacepaz.com"

lang: "ja"
timezone: "Asia/Tokyo"
encoding: "utf-8"

# --- ビルド設定 ---
permalink: "pretty"

# --- Jekyllプラグイン ---
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# --- キャッシュバスター ---
# 修正日基準で更新
asset_version: "20260413-1"

# --- デフォルト設定 ---
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: "/images/hero/ogp-counseling-space-paz.png"

# --- コレクション (ブログ) ---
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# --- 静的ファイル配信 ---
include:
  - contents
